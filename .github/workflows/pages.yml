name: Kochbuch veröffentlichen

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Repository laden
        uses: actions/checkout@v6
      - name: GitHub Pages einrichten
        uses: actions/configure-pages@v5
      - name: Statische Dateien hochladen
        uses: actions/upload-pages-artifact@v4
        with:
          path: '.'
      - name: Website veröffentlichen
        id: deployment
        uses: actions/deploy-pages@v4
