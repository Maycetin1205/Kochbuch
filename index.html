<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#b84f35">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Kochbuch">
<title>Mein Kochbuch</title>
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./icon-192.svg">
<link rel="stylesheet" href="./styles.css">
<link rel="stylesheet" href="./portions.css">
</head>
<body>
<div class="shell">
<header class="topbar"><div class="topbar-inner">
<div class="brand"><div class="brand-mark">🍲</div><div><strong>Mein Kochbuch</strong><small>Auf allen Geräten per GitHub Pages</small></div></div>
<nav class="nav" aria-label="Hauptnavigation">
<button data-view="recipes">📚 <span>Rezepte</span></button>
<button data-view="favorites">❤️ <span>Favoriten</span></button>
<button data-view="shopping">🛒 <span>Einkaufsliste</span></button>
<button data-view="categories">📂 <span>Kategorien</span></button>
<button data-view="import">➕ <span>Import</span></button>
</nav>
<button class="icon-btn" id="themeBtn" title="Darstellung wechseln">◐</button>
</div></header>
<main class="main" id="app"></main>
<footer class="footer">Rezepte, Favoriten, Einkaufsliste und lokal ausgewählte Bilder werden in IndexedDB auf diesem Gerät gespeichert.</footer>
<div class="toast" id="toast"></div>
</div>
<script src="./default-recipes.js"></script>
<script src="./app-core.js"></script>
<script src="./app-views.js"></script>
<script src="./app-actions.js"></script>
<script src="./app-portions.js"></script>
</body>
</html>
